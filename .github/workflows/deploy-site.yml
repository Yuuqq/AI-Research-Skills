name: Deploy Site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/ai-skills-site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        working-directory: artifacts/ai-skills-site
        run: npm install

      - name: Build site
        working-directory: artifacts/ai-skills-site
        env:
          BASE_PATH: /${{ github.event.repository.name }}
          VITE_DISABLE_VOTES: "1"
        run: npx vite build --config vite.config.ts

      - name: Generate SEO pages
        working-directory: artifacts/ai-skills-site
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: npx tsx scripts/build-seo.ts

      - name: Fix permissions
        working-directory: artifacts/ai-skills-site/dist
        run: |
          chmod -R +r .
          find . -type d -exec chmod +x {} +

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/ai-skills-site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
